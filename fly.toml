# fly.toml app configuration file generated for cinder-tmcp on 2026-07-19T19:37:02Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cinder-tmcp'
primary_region = 'iad'
kill_signal = 'SIGTERM'
kill_timeout = '10s'

[build]
  dockerfile = 'Dockerfile'

[env]
  LOG_LEVEL = 'info'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '15s'
    timeout = '4s'
    grace_period = '3s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
